<!-- @dsCard group="Dashboard" viewport="1320x880" name="fetchira dashboard" subtitle="Overview · Accounts · Activity — live quota router control panel" -->
<!-- @startingPoint section="Dashboard" subtitle="Full fetchira router dashboard — 3 tabs, live log, add-account flow" viewport="1320x880" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>fetchira — router dashboard</title>
<link rel="icon" type="image/svg+xml" href="../../assets/logo-mark.svg">
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { background: var(--bg-base); }
  #root { min-height: 100vh; }
  @keyframes fx-spin { to { transform: rotate(360deg); } }
  .fx-spin { animation: fx-spin 0.7s linear infinite; }
</style>
<!-- Vendored locally so the dashboard works fully offline (no CDN dependency). -->
<script src="../../vendor/react.production.min.js"></script>
<script src="../../vendor/react-dom.production.min.js"></script>
<script src="../../vendor/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<!-- Kick the first live fetch during babel warm-up so the app mounts already-live: the account
     cards paint immediately with per-card loaders instead of a global "loading live quota…". The
     fetch (cached snapshot, ~ms) finishes long before babel transforms the JSX below. -->
<script>
  (function () {
    var t = new URLSearchParams(location.search).get('token');
    if (!t) return;
    window.__fxBoot = fetch('/api/state', { headers: { 'x-fetchira-token': t } })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) { if (d) { window.FX = Object.assign({}, window.FX || {}, d); window.__fxLive = true; } })
      .catch(function () {});
  })();
</script>
</head>
<body class="fx-backplate">
<div id="root"></div>

<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="OverviewTab.jsx"></script>
<script type="text/babel" src="AccountsTab.jsx"></script>
<script type="text/babel" src="ActivityTab.jsx"></script>
<script type="text/babel" src="AddAccountModal.jsx"></script>

<script type="text/babel">
const { Tabs, Button, Card, Badge } = window.FetchiraDesignSystem_6526df;

function EmptyState({ onAdd }) {
  return (
    <div style={{ maxWidth: 560, margin: '8vh auto 0', textAlign: 'center', padding: '0 20px' }}>
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 24, fontWeight: 600, color: 'var(--text-hi)', letterSpacing: '-0.02em', marginBottom: 8 }}>No providers yet</div>
      <div style={{ fontFamily: 'var(--font-ui)', fontSize: 14, color: 'var(--text-mid)', marginBottom: 24, lineHeight: 1.55 }}>
        fetchira routes search, read and deep-research calls across free-tier providers.
        Add your first account to start filling the tank.
      </div>
      <div style={{ display: 'inline-flex', flexWrap: 'wrap', gap: 8, justifyContent: 'center', marginBottom: 28 }}>
        {['serper','tavily','exa','firecrawl','steel','gemini_web','grok_web'].map((p) => (
          <Badge key={p} tone="neutral" variant="outline">{p}</Badge>
        ))}
      </div>
      <div>
        <Button variant="primary" size="lg" iconLeft={<span style={{ fontFamily: 'var(--font-mono)', fontWeight: 700 }}>+</span>} onClick={onAdd}>Add your first provider</Button>
      </div>
    </div>
  );
}

function Loading() {
  return (
    <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', minHeight: '40vh', gap: 12, fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--text-faint)' }}>
      <span className="fx-spin" style={{ width: 16, height: 16, border: '2px solid var(--border-hairline)', borderTopColor: 'var(--lime-500)', borderRadius: '50%' }} />
      loading live quota…
    </div>
  );
}

function OfflineToast() {
  return (
    <div style={{ position: 'fixed', bottom: 16, left: 0, right: 0, zIndex: 100, display: 'flex', justifyContent: 'center', pointerEvents: 'none' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 16px', background: 'var(--red-dim)', border: '1px solid rgba(242,85,90,0.4)', borderRadius: 'var(--r-sm)', fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--red-500)', boxShadow: '0 8px 24px rgba(0,0,0,0.4)' }}>
        <span style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--red-500)' }} />
        UI server offline — restart with <code style={{ color: 'var(--text-hi)', background: 'rgba(255,255,255,0.07)', padding: '1px 6px', borderRadius: 4 }}>fetchira ui</code> in your terminal
      </div>
    </div>
  );
}

function UpdateBanner({ u }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '0 auto 16px', padding: '10px 16px', background: 'var(--lime-dim, rgba(170,230,90,0.12))', border: '1px solid rgba(170,230,90,0.35)', borderRadius: 'var(--r-sm)', fontFamily: 'var(--font-ui)', fontSize: 13, color: 'var(--text-hi)' }}>
      <span style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--lime-500)' }} />
      <span>fetchira <b>{u.latest}</b> is available — run <code style={{ fontFamily: 'var(--font-mono)', background: 'rgba(255,255,255,0.07)', padding: '1px 6px', borderRadius: 4, color: 'var(--text-hi)' }}>{u.command}</code></span>
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState(new URLSearchParams(location.search).get('tab') || 'overview');
  const [modal, setModal] = React.useState(new URLSearchParams(location.search).get('modal') === 'add');
  const [seeded, setSeeded] = React.useState(true);
  const [online, setOnline] = React.useState(true);
  // 'loading' until the first live /api/state; a served page starts here so the shell paints
  // instantly instead of blocking on the (cold) fan-out. No token / a failed fetch = opened
  // standalone, so fall back to the bundled mock. A mutation re-mount (fxRefresh already loaded
  // live state) starts at 'live' so it doesn't flash the spinner again.
  const [phase, setPhase] = React.useState(
    window.__fxLive ? 'live' : window.FX_TOKEN ? 'loading' : 'mock'
  );
  const [, bump] = React.useState(0); // re-render with the freshly polled state
  const everOnline = React.useRef(false); // only nag once the server has actually been reached

  React.useEffect(() => {
    window.fxSetOffline = (v) => setOnline(!v);
    // Poll keeps quota and the route-log snapshot live, so tabs re-seed from current data
    // instead of the page-load snapshot (the Overview log seeds from FX.log on mount).
    const ping = async () => {
      try {
        const r = await fetch('/api/state', { headers: { 'x-fetchira-token': window.FX_TOKEN } });
        if (!r.ok) { setOnline(false); setPhase((p) => p === 'loading' ? 'mock' : p); return; }
        everOnline.current = true;
        setOnline(true);
        window.FX = Object.assign({}, window.FX, await r.json());
        setPhase('live');
        bump((n) => n + 1);
      } catch (e) { setOnline(false); setPhase((p) => p === 'loading' ? 'mock' : p); }
    };
    // If the boot fetch (kicked during babel warm-up) is still resolving, flip to live the moment
    // it lands — don't wait for the first poll, and never flash the global spinner.
    if (window.__fxBoot) window.__fxBoot.then(() => { if (window.__fxLive) { setPhase('live'); bump((n) => n + 1); } });
    ping();
    const id = setInterval(ping, 5000);
    return () => clearInterval(id);
  }, []);

  const tabs = [
    { id: 'overview', label: 'Overview' },
    { id: 'accounts', label: 'Accounts', count: window.FX.accounts.length },
    { id: 'activity', label: 'Activity' },
  ];

  return (
    <React.Fragment>
      {!online && everOnline.current && <OfflineToast />}
      <window.TopBar onAdd={() => setModal(true)} />

      <div style={{ position: 'sticky', top: 'var(--topbar-h)', zIndex: 15, background: 'rgba(10,12,17,0.8)', backdropFilter: 'blur(12px)', borderBottom: '1px solid var(--border-faint)', padding: '10px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <Tabs items={tabs} value={tab} onChange={setTab} />
        <button onClick={() => setSeeded((s) => !s)} style={{ background: 'transparent', border: '1px solid var(--border-hairline)', color: 'var(--text-faint)', fontFamily: 'var(--font-mono)', fontSize: 11, padding: '4px 9px', borderRadius: 'var(--r-xs)', cursor: 'pointer' }}>
          {seeded ? 'demo: empty state' : 'demo: seeded'}
        </button>
      </div>

      <main style={{ maxWidth: 'var(--container-max)', margin: '0 auto', padding: '20px' }}>
        {window.FX.update && <UpdateBanner u={window.FX.update} />}
        {phase === 'loading' ? <Loading />
          : !seeded ? <EmptyState onAdd={() => setModal(true)} />
          : tab === 'overview' ? <window.OverviewTab />
          : tab === 'accounts' ? <window.AccountsTab onAdd={() => setModal(true)} />
          : <window.ActivityTab />}
      </main>

      {modal && <window.AddAccountModal onClose={() => setModal(false)} />}
    </React.Fragment>
  );
}

// Live wiring: talk to the local fetchira server. window.FX starts as the bundled mock and
// is replaced by real router state; mutations (add/remove/login/test) POST back and refresh.
// A failed fetch (opened as a static file / offline) just keeps the mock so the design still
// previews standalone.
window.FX_TOKEN = new URLSearchParams(location.search).get('token') || '';

window.apiPost = async function (path, body) {
  let r;
  try {
    r = await fetch(path, {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-fetchira-token': window.FX_TOKEN },
      body: JSON.stringify(body || {}),
    });
  } catch (e) {
    if (window.fxSetOffline) window.fxSetOffline(true);
    throw new Error('UI server offline — run `fetchira ui` in your terminal');
  }
  let data = null;
  try { data = await r.json(); } catch (e) {}
  if (!r.ok) throw new Error((data && data.error) || ('request failed (' + r.status + ')'));
  return data;
};

async function loadFX() {
  try {
    const r = await fetch('/api/state', { headers: { 'x-fetchira-token': window.FX_TOKEN } });
    if (r.ok) { window.FX = Object.assign({}, window.FX, await r.json()); window.__fxLive = true; }
  } catch (e) { /* standalone / offline → keep mock */ }
}

let __root;
window.fxRefresh = async function () { await loadFX(); __root.render(<App />); };

// Paint the shell immediately; App's poll loads live state and swaps it in. A cold /api/state
// fan-out can take seconds — don't hold the first paint hostage to it.
__root = ReactDOM.createRoot(document.getElementById('root'));
__root.render(<App />);
</script>
</body>
</html>
